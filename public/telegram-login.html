<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="telegram-bot" content="GENNFC_Bot" />
    <title>Continue with Telegram</title>
    <style>
      body {
        align-items: center;
        background: #f8fafc;
        color: #0f172a;
        display: flex;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }
      main {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 28px;
        text-align: center;
        max-width: 360px;
        width: calc(100% - 32px);
      }
      #telegram-widget {
        margin-top: 12px;
        min-height: 48px;
      }
      .hint {
        color: #64748b;
        font-size: 13px;
        line-height: 1.45;
        margin-top: 12px;
      }
      .error {
        color: #b91c1c;
        font-size: 14px;
      }
      .warn {
        background: #fff7ed;
        border: 1px solid #fdba74;
        border-radius: 10px;
        color: #9a3412;
        font-size: 12px;
        line-height: 1.45;
        margin-bottom: 12px;
        padding: 10px 12px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Telegram Login</h1>
      <p id="domain-warn" class="warn" hidden></p>
      <div id="telegram-widget"></div>
      <p id="hint" class="hint" hidden></p>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var metaBot = document.querySelector('meta[name="telegram-bot"]');
        var defaultBot = (metaBot && metaBot.getAttribute('content')) || 'GENNFC_Bot';
        var bot = (params.get('bot') || defaultBot).replace(/^@/, '').trim();
        var authUrl = params.get('auth_url') || '';

        if (!authUrl) {
          var callback = new URL('/telegram-auth-callback.html', window.location.origin);
          var returnOrigin =
            params.get('return_origin') ||
            (document.referrer ? new URL(document.referrer).origin : '') ||
            window.location.origin;
          if (returnOrigin) {
            callback.searchParams.set('return_origin', returnOrigin);
          }
          authUrl = callback.toString();
        }

        var mount = document.getElementById('telegram-widget');
        var hint = document.getElementById('hint');
        var domainWarn = document.getElementById('domain-warn');
        var host = window.location.hostname;
        var prodHost = 'sitehubman.vercel.app';

        if (host === 'localhost' || host === '127.0.0.1') {
          domainWarn.hidden = false;
          domainWarn.innerHTML =
            '<strong>Bot domain invalid on localhost?</strong><br>' +
            'In @BotFather run <code>/setdomain</code> and send <code>localhost</code> ' +
            '(only one domain per bot — this replaces <code>' +
            prodHost +
            '</code> until you set it again).<br>' +
            'Or test on <a href="https://' +
            prodHost +
            '/telegram-login.html">https://' +
            prodHost +
            '</a>.';
        }

        if (!bot) {
          mount.textContent = 'Telegram login is not configured.';
          mount.className = 'error';
          hint.hidden = false;
          hint.textContent =
            'Set EXPO_PUBLIC_TELEGRAM_BOT_USERNAME or open this page from the app login screen.';
          return;
        }

        var script = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.async = true;
        script.setAttribute('data-telegram-login', bot);
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-userpic', 'true');
        script.setAttribute('data-auth-url', authUrl);
        script.setAttribute('data-request-access', 'write');
        mount.appendChild(script);
      })();
    </script>
  </body>
</html>
